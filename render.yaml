# Render.com Deployment Configuration
# UK Business Mileage Tracker - CIS Market

services:
  # Backend API Service
  - type: web
    name: mileage-tracker-api
    runtime: node
    plan: starter
    buildCommand: cd backend && npm install && npx prisma generate
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: mileage-tracker-db
          property: connectionString
      - key: JWT_PRIVATE_KEY
        generateValue: true
      - key: JWT_PUBLIC_KEY
        generateValue: true
      - key: JWT_ACCESS_TOKEN_EXPIRY
        value: 15m
      - key: JWT_REFRESH_TOKEN_EXPIRY
        value: 7d
      - key: COOKIE_SECRET
        generateValue: true
      - key: BCRYPT_ROUNDS
        value: 12
      - key: APP_URL
        value: https://mileage-tracker-api.onrender.com
      - key: FRONTEND_URL
        value: https://mileage-tracker.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://mileage-tracker.onrender.com,https://mileage-tracker-api.onrender.com
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: AUTH_RATE_LIMIT_MAX
        value: 5
      - key: LOG_LEVEL
        value: info
      - key: REPORT_EXPIRY_DAYS
        value: 30
      - key: DEFAULT_CURRENCY
        value: GBP
      - key: HMRC_RATE_STANDARD
        value: 0.45
      - key: HMRC_RATE_REDUCED
        value: 0.25
      - key: HMRC_MILEAGE_THRESHOLD
        value: 10000
      - key: TAX_YEAR_START_MONTH
        value: 4
      - key: TAX_YEAR_START_DAY
        value: 6
      # Mobile-specific settings
      - key: MOBILE_SYNC_BATCH_SIZE
        value: 100
      - key: MOBILE_MAX_TRIP_AGE_DAYS
        value: 365
      - key: GPS_MIN_ACCURACY_METERS
        value: 50
      - key: RECEIPT_STORAGE_PROVIDER
        value: local
      - key: MAX_RECEIPT_SIZE_MB
        value: 10
      - key: CIS_DEFAULT_RATE
        value: 0.20

  # Frontend Static Site
  - type: static
    name: mileage-tracker
    runtime: static
    plan: starter
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://mileage-tracker-api.onrender.com/api
      - key: VITE_APP_NAME
        value: Mileage Tracker
      - key: VITE_CURRENCY
        value: GBP
      - key: VITE_DEFAULT_MILEAGE_RATE
        value: 0.45
    routes:
      - type: rewrite
        source: /api/*
        destination: https://mileage-tracker-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: mileage-tracker-db
    plan: starter
    databaseName: mileage_tracker
    user: mileage_tracker

# Environment Group for Shared Settings
envVarGroups:
  - name: mileage-tracker-common
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEFAULT_CURRENCY
        value: GBP
