# Render Blueprint for Mileage Tracker
# UK Business Mileage Tracking App for CIS Contractors

services:
  # Backend API Service
  - type: web
    name: mileage-api
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: cd backend && npm install && npx prisma generate
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: mileage-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://mileage-tracker.onrender.com
      - key: CLIENT_URL
        value: https://mileage-tracker.onrender.com
      - key: HMRC_RATE_FIRST_10000
        value: 0.45
      - key: HMRC_RATE_OVER_10000
        value: 0.25
    healthCheckPath: /health
    autoDeploy: true

  # Frontend Static Site
  - type: static
    name: mileage-tracker
    plan: starter
    region: frankfurt
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://mileage-api.onrender.com/api
      - key: VITE_APP_NAME
        value: Mileage Tracker
      - key: VITE_APP_VERSION
        value: 1.0.0
      - key: VITE_ENABLE_PWA
        value: true
    routes:
      - type: rewrite
        source: /api/*
        destination: https://mileage-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin

databases:
  - name: mileage-db
    plan: starter
    region: frankfurt
    databaseName: mileage_tracker
    user: mileage_user

# Environment Group (optional - for shared env vars)
envVarGroups:
  - name: mileage-secrets
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true